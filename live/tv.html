<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>📺 TV Mode - ARK Games 3.0</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/live.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      background: var(--color-black);
      height: 100vh;
      overflow: hidden;
    }
    
    .tv-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* TV Header */
    .tv-header {
      background: linear-gradient(135deg, var(--color-charcoal), var(--color-black));
      padding: var(--space-6) var(--space-8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--color-rust);
    }
    
    .tv-logo {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    
    .tv-logo .emoji {
      font-size: 3.5rem;
    }
    
    .tv-logo .name {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: var(--weight-black);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }
    
    .tv-status {
      display: flex;
      align-items: center;
      gap: var(--space-6);
    }
    
    .tv-clock {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      color: var(--color-gray);
      letter-spacing: var(--tracking-wider);
    }
    
    /* Main Content */
    .tv-main {
      flex: 1;
      display: flex;
      padding: var(--space-8);
      gap: var(--space-8);
      background: 
        linear-gradient(135deg, rgba(10, 10, 18, 0.95), rgba(26, 26, 46, 0.9)),
        url('../assets/images/texture-grunge.webp') center/cover;
    }
    
    /* Timer Section */
    .timer-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-charcoal), rgba(0, 0, 0, 0.8));
      border-radius: var(--border-radius-xl);
      padding: var(--space-10);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }
    
    .heat-info {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--color-gray);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
      margin-bottom: var(--space-3);
    }
    
    .heat-info .cat {
      color: var(--color-rust);
      font-weight: var(--weight-bold);
    }
    
    .wod-name {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: var(--weight-black);
      text-transform: uppercase;
      margin-bottom: var(--space-6);
      background: linear-gradient(135deg, var(--color-rust), var(--color-amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .timer-display {
      font-family: var(--font-display);
      font-size: 12rem;
      font-weight: var(--weight-black);
      line-height: 1;
      margin: var(--space-6) 0;
      letter-spacing: var(--tracking-wider);
    }
    
    @media (min-width: 1920px) {
      .timer-display { font-size: 18rem; }
    }
    
    @media (min-width: 2560px) {
      .timer-display { font-size: 22rem; }
    }
    
    .timer-display.countdown {
      color: var(--color-amber);
      text-shadow: 0 0 60px rgba(243, 156, 18, 0.6);
      animation: countPulse 1s infinite;
    }
    
    @keyframes countPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .timer-display.running {
      color: var(--color-success);
      text-shadow: 0 0 60px rgba(46, 204, 113, 0.5);
    }
    
    .timer-display.done {
      color: var(--color-danger);
      text-shadow: 0 0 60px rgba(231, 76, 60, 0.5);
    }
    
    /* Lanes */
    .lanes {
      display: flex;
      gap: var(--space-5);
      margin-top: var(--space-8);
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .lane {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius-lg);
      padding: var(--space-6) var(--space-8);
      text-align: center;
      min-width: 160px;
      transition: var(--transition-base);
    }
    
    .lane:hover {
      border-color: var(--color-rust);
      background: rgba(233, 69, 96, 0.1);
    }
    
    .lane .num {
      color: var(--color-gray);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-widest);
      margin-bottom: var(--space-2);
    }
    
    .lane .emoji {
      font-size: 3.5rem;
      margin: var(--space-2) 0;
    }
    
    .lane .name {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
    }
    
    /* Leaderboard Section */
    .lb-section {
      width: 450px;
      background: linear-gradient(135deg, var(--color-charcoal), rgba(0, 0, 0, 0.8));
      border-radius: var(--border-radius-xl);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }
    
    .lb-title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .lb-cat-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
    }
    
    .lb-cat-tab {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--border-radius-full);
      background: rgba(255, 255, 255, 0.1);
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition-base);
    }
    
    .lb-cat-tab:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .lb-cat-tab.active {
      background: linear-gradient(135deg, var(--color-rust), var(--color-amber));
      box-shadow: var(--glow-rust);
    }
    
    .lb-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--color-rust) transparent;
    }
    
    .lb-list::-webkit-scrollbar {
      width: 6px;
    }
    
    .lb-list::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .lb-list::-webkit-scrollbar-thumb {
      background: var(--color-rust);
      border-radius: var(--border-radius-full);
    }
    
    .lb-row {
      display: flex;
      align-items: center;
      padding: var(--space-4);
      border-radius: var(--border-radius-md);
      margin-bottom: var(--space-2);
      background: rgba(255, 255, 255, 0.03);
      transition: var(--transition-base);
    }
    
    .lb-row:hover {
      background: rgba(233, 69, 96, 0.1);
    }
    
    .lb-row:nth-child(1) {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(243, 156, 18, 0.1));
    }
    
    .lb-row:nth-child(2) {
      background: rgba(192, 192, 192, 0.1);
    }
    
    .lb-row:nth-child(3) {
      background: rgba(205, 127, 50, 0.1);
    }
    
    .lb-rank {
      width: 45px;
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-black);
      color: var(--color-gray);
    }
    
    .lb-row:nth-child(1) .lb-rank {
      background: linear-gradient(135deg, #ffd700, #f39c12);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .lb-row:nth-child(2) .lb-rank {
      background: linear-gradient(135deg, #c0c0c0, #95a5a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .lb-row:nth-child(3) .lb-rank {
      background: linear-gradient(135deg, #cd7f32, #a04000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .lb-team {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .lb-team .emoji {
      font-size: 1.8rem;
    }
    
    .lb-team .name {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
    }
    
    .lb-points {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: var(--weight-black);
      color: var(--color-teal);
    }
    
    /* Waiting State */
    .waiting {
      text-align: center;
      color: var(--color-gray);
    }
    
    .waiting .big {
      font-size: 6rem;
      margin-bottom: var(--space-6);
    }
    
    .waiting h2 {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }
    
    /* Back button */
    .back-btn {
      position: fixed;
      top: var(--space-4);
      left: var(--space-4);
      color: var(--color-gray);
      text-decoration: none;
      font-size: var(--text-sm);
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--border-radius-md);
      backdrop-filter: blur(10px);
      transition: var(--transition-base);
    }
    
    .back-btn:hover {
      color: var(--color-white);
      background: var(--color-rust);
    }
    
    @media (max-width: 1200px) {
      .tv-main {
        flex-direction: column;
      }
      .lb-section {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <a href="../" class="back-btn">← Home</a>
  
  <div class="tv-container">
    <div class="tv-header">
      <div class="tv-logo">
        <span class="emoji">🐾</span>
        <span class="name" id="compName">ARK GAMES</span>
      </div>
      <div class="tv-status">
        <span class="live-indicator">LIVE</span>
        <span class="tv-clock" id="clock">00:00:00</span>
      </div>
    </div>
    
    <div class="tv-main">
      <div class="timer-section">
        <div id="timerContent">
          <div class="waiting">
            <div class="big">🏋️</div>
            <h2>In attesa della prossima heat...</h2>
          </div>
        </div>
      </div>
      
      <div class="lb-section">
        <div class="lb-title">🏆 Classifica</div>
        <div class="lb-cat-tabs" id="catTabs"></div>
        <div class="lb-list" id="lbList">
          <div class="waiting">
            <div class="loading-spinner"></div>
            <p style="margin-top: var(--space-4)">Caricamento...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from '../firebase-config.js';
    
    const urlParams = new URLSearchParams(location.search);
    const compId = urlParams.get('c') || localStorage.getItem('ark2_compId');
    const seasonId = urlParams.get('s') || localStorage.getItem('ark2_seasonId');
    
    const isSeasonMode = !!seasonId && !compId;
    const basePath = isSeasonMode ? `seasons/${seasonId}` : `competitions/${compId}`;
    
    if (compId) localStorage.setItem('ark2_compId', compId);
    if (seasonId) localStorage.setItem('ark2_seasonId', seasonId);
    
    if (!compId && !seasonId) location.href = 'index.html';
    
    let competition = null;
    let categories = [];
    let currentCategory = null;
    let teams = {};
    let workouts = {};
    let scores = {};
    
    // Clock
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
    }, 1000);
    
    async function init() {
      competition = await DB.get(`${basePath}`);
      if (!competition) return;
      
      document.getElementById('compName').textContent = competition.name || 'ARK GAMES';
      categories = competition.categories || ['Experience', 'Scaled', 'Open'];
      currentCategory = categories[0];
      
      teams = await DB.get(`${basePath}/teams`) || {};
      workouts = await DB.get(`${basePath}/workouts`) || {};
      
      renderCatTabs();
      loadScores();
      listenForHeat();
      
      // Auto-rotate categories
      setInterval(() => {
        const idx = categories.indexOf(currentCategory);
        currentCategory = categories[(idx + 1) % categories.length];
        updateCatTabs();
        renderLeaderboard();
      }, 15000);
    }
    
    function renderCatTabs() {
      document.getElementById('catTabs').innerHTML = categories.map(c => `
        <div class="lb-cat-tab ${c === currentCategory ? 'active' : ''}" onclick="selectCat('${c}')">${c}</div>
      `).join('');
    }
    
    function updateCatTabs() {
      document.querySelectorAll('.lb-cat-tab').forEach(t => {
        t.classList.toggle('active', t.textContent === currentCategory);
      });
    }
    
    window.selectCat = (cat) => {
      currentCategory = cat;
      updateCatTabs();
      renderLeaderboard();
    };
    
    function loadScores() {
      DB.listen(`${basePath}/scores`, (s) => {
        scores = s || {};
        renderLeaderboard();
      });
    }
    
    function renderLeaderboard() {
      const list = document.getElementById('lbList');
      
      const catTeams = Object.entries(teams)
        .filter(([id, t]) => t.category === currentCategory)
        .map(([id, t]) => ({ id, ...t }));
      
      if (catTeams.length === 0) {
        list.innerHTML = '<div class="waiting">Nessun team</div>';
        return;
      }
      
      const catWorkouts = Object.entries(workouts)
        .filter(([id, w]) => !w.categories || w.categories.includes(currentCategory));
      
      // Calculate points
      const teamPoints = catTeams.map(team => {
        let total = 0;
        catWorkouts.forEach(([wodId, wod]) => {
          const scoreKey = `${team.id}_${wodId}`;
          if (scores[scoreKey]) {
            total += 1;
          }
        });
        return { ...team, points: total };
      });
      
      teamPoints.sort((a, b) => b.points - a.points);
      
      list.innerHTML = teamPoints.map((t, i) => `
        <div class="lb-row">
          <div class="lb-rank">${i + 1}</div>
          <div class="lb-team">
            <span class="emoji">${t.emoji}</span>
            <span class="name">${t.name}</span>
          </div>
          <div class="lb-points">${t.points}</div>
        </div>
      `).join('');
    }
    
    function listenForHeat() {
      DB.listen(`${basePath}/currentHeat`, (heat) => {
        const container = document.getElementById('timerContent');
        
        if (!heat || heat.status === 'pending') {
          container.innerHTML = `
            <div class="waiting">
              <div class="big">🏋️</div>
              <h2>In attesa della prossima heat...</h2>
            </div>
          `;
          return;
        }
        
        const heatTeams = (heat.lanes || []).map(tid => teams[tid]).filter(Boolean);
        
        if (heat.status === 'countdown') {
          container.innerHTML = `
            <div class="heat-info">Heat ${heat.number || '?'} · <span class="cat">${heat.category || ''}</span></div>
            <div class="wod-name">${heat.wodName || 'WOD'}</div>
            <div class="timer-display countdown" id="countdown">${heat.countdownFrom || 10}</div>
            <div class="lanes">
              ${heatTeams.map((t, i) => `
                <div class="lane">
                  <div class="num">Lane ${i + 1}</div>
                  <div class="emoji">${t.emoji}</div>
                  <div class="name">${t.name}</div>
                </div>
              `).join('')}
            </div>
          `;
          startCountdown(heat.countdownFrom || 10);
        } else if (heat.status === 'running') {
          container.innerHTML = `
            <div class="heat-info">Heat ${heat.number || '?'} · <span class="cat">${heat.category || ''}</span></div>
            <div class="wod-name">${heat.wodName || 'WOD'}</div>
            <div class="timer-display running" id="timer">00:00</div>
            <div class="lanes">
              ${heatTeams.map((t, i) => `
                <div class="lane">
                  <div class="num">Lane ${i + 1}</div>
                  <div class="emoji">${t.emoji}</div>
                  <div class="name">${t.name}</div>
                </div>
              `).join('')}
            </div>
          `;
          startTimer(heat.timeCapSec, heat.startedAt);
        }
      });
    }
    
    let countdownInterval = null;
    function startCountdown(from) {
      if (countdownInterval) clearInterval(countdownInterval);
      let count = from;
      
      countdownInterval = setInterval(() => {
        count--;
        const el = document.getElementById('countdown');
        if (el) {
          if (count > 0) {
            el.textContent = count;
          } else {
            el.textContent = 'GO!';
            clearInterval(countdownInterval);
          }
        }
      }, 1000);
    }
    
    let timerInterval = null;
    function startTimer(timeCapSec, startedAt) {
      if (timerInterval) clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const el = document.getElementById('timer');
        if (!el) return;
        
        if (elapsed >= timeCapSec) {
          el.textContent = 'TIME!';
          el.classList.remove('running');
          el.classList.add('done');
          clearInterval(timerInterval);
          return;
        }
        
        const min = Math.floor(elapsed / 60);
        const sec = elapsed % 60;
        el.textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
      }, 100);
    }
    
    init();
  </script>
</body>
</html>
