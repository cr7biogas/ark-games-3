<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>📺 TV - ARK Games 2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    
    .tv-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .tv-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tv-logo {
      font-size: 36px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .tv-logo .emoji { font-size: 50px; }
    .tv-status {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .live-badge {
      background: #e94560;
      padding: 8px 20px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 18px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .tv-time {
      font-size: 24px;
      font-family: 'SF Mono', Monaco, monospace;
      color: #888;
    }
    
    /* Main content */
    .tv-main {
      flex: 1;
      display: flex;
      padding: 30px;
      gap: 30px;
    }
    
    /* Timer section */
    .timer-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-radius: 30px;
      padding: 40px;
    }
    .heat-info {
      font-size: 28px;
      color: #888;
      margin-bottom: 10px;
    }
    .heat-info .cat {
      color: #e94560;
      font-weight: 700;
    }
    .timer-display {
      font-size: 180px;
      font-weight: 800;
      font-family: 'SF Mono', Monaco, monospace;
      line-height: 1;
      margin: 20px 0;
    }
    @media (min-width: 1920px) {
      .timer-display { font-size: 280px; }
    }
    @media (min-width: 2560px) {
      .timer-display { font-size: 350px; }
    }
    .timer-display.countdown {
      color: #f1c40f;
      animation: countPulse 1s infinite;
    }
    @keyframes countPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .timer-display.running { color: #2ecc71; }
    .timer-display.done { color: #e94560; }
    
    .wod-name {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    
    /* Lanes */
    .lanes {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }
    .lane {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 25px 40px;
      text-align: center;
      min-width: 180px;
    }
    .lane .num {
      color: #888;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .lane .emoji {
      font-size: 50px;
      margin-bottom: 8px;
    }
    .lane .name {
      font-size: 20px;
      font-weight: 600;
    }
    
    /* Leaderboard section */
    .lb-section {
      width: 450px;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }
    .lb-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .lb-cat-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .lb-cat-tab {
      padding: 10px 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      font-size: 14px;
      cursor: pointer;
    }
    .lb-cat-tab.active {
      background: #e94560;
    }
    .lb-list {
      flex: 1;
      overflow-y: auto;
    }
    .lb-row {
      display: flex;
      align-items: center;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.03);
    }
    .lb-row:nth-child(1) { background: rgba(255,215,0,0.15); }
    .lb-row:nth-child(2) { background: rgba(192,192,192,0.1); }
    .lb-row:nth-child(3) { background: rgba(205,127,50,0.1); }
    .lb-rank {
      width: 40px;
      font-size: 24px;
      font-weight: 800;
      color: #888;
    }
    .lb-row:nth-child(1) .lb-rank { color: #ffd700; }
    .lb-row:nth-child(2) .lb-rank { color: #c0c0c0; }
    .lb-row:nth-child(3) .lb-rank { color: #cd7f32; }
    .lb-team {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lb-team .emoji { font-size: 28px; }
    .lb-team .name { font-size: 16px; font-weight: 600; }
    .lb-points {
      font-size: 24px;
      font-weight: 800;
      color: #e94560;
    }
    
    /* Waiting state */
    .waiting {
      text-align: center;
      color: #666;
    }
    .waiting .big {
      font-size: 100px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <a href="../" style="position:fixed;top:15px;left:15px;color:#888;text-decoration:none;font-size:14px;z-index:100;background:rgba(0,0,0,0.5);padding:8px 12px;border-radius:8px;">← Home</a>
  <div class="tv-container">
    <div class="tv-header">
      <div class="tv-logo">
        <span class="emoji">🐾</span>
        <span id="compName">ARK Games</span>
      </div>
      <div class="tv-status">
        <span class="live-badge">● LIVE</span>
        <span class="tv-time" id="clock">00:00:00</span>
      </div>
    </div>
    
    <div class="tv-main">
      <div class="timer-section">
        <div id="timerContent">
          <div class="waiting">
            <div class="big">🏋️</div>
            <h2>In attesa della prossima heat...</h2>
          </div>
        </div>
      </div>
      
      <div class="lb-section">
        <div class="lb-title">🏆 Classifica</div>
        <div class="lb-cat-tabs" id="catTabs"></div>
        <div class="lb-list" id="lbList">
          <div class="waiting">Caricamento...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from '../firebase-config.js';
    
    // Get compId or seasonId from URL param
    const urlParams = new URLSearchParams(location.search);
    const compId = urlParams.get('c') || localStorage.getItem('ark2_compId');
    const seasonId = urlParams.get('s') || localStorage.getItem('ark2_seasonId');
    
    // Determine mode: competition or season
    const isSeasonMode = !!seasonId && !compId;
    const basePath = isSeasonMode ? `seasons/${seasonId}` : `competitions/${compId}`;
    
    if (compId) localStorage.setItem('ark2_compId', compId);
    if (seasonId) localStorage.setItem('ark2_seasonId', seasonId);
    
    if (!compId && !seasonId) location.href = 'index.html';
    
    let competition = null;
    let categories = [];
    let currentCategory = null;
    let teams = {};
    let workouts = {};
    let scores = {};
    
    // Clock
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
    }, 1000);
    
    async function init() {
      competition = await DB.get(`${basePath}`);
      if (!competition) return;
      
      document.getElementById('compName').textContent = competition.name || 'ARK Games';
      categories = competition.categories || ['Experience', 'Scaled', 'Open'];
      currentCategory = categories[0];
      
      teams = await DB.get(`${basePath}/teams`) || {};
      workouts = await DB.get(`${basePath}/workouts`) || {};
      
      renderCatTabs();
      loadScores();
      listenForHeat();
      
      // Auto-rotate categories
      setInterval(() => {
        const idx = categories.indexOf(currentCategory);
        currentCategory = categories[(idx + 1) % categories.length];
        updateCatTabs();
        renderLeaderboard();
      }, 15000);
    }
    
    function renderCatTabs() {
      document.getElementById('catTabs').innerHTML = categories.map(c => `
        <div class="lb-cat-tab ${c === currentCategory ? 'active' : ''}" onclick="selectCat('${c}')">${c}</div>
      `).join('');
    }
    
    function updateCatTabs() {
      document.querySelectorAll('.lb-cat-tab').forEach(t => {
        t.classList.toggle('active', t.textContent === currentCategory);
      });
    }
    
    window.selectCat = (cat) => {
      currentCategory = cat;
      updateCatTabs();
      renderLeaderboard();
    };
    
    function loadScores() {
      DB.listen(`${basePath}/scores`, (s) => {
        scores = s || {};
        renderLeaderboard();
      });
    }
    
    function renderLeaderboard() {
      const list = document.getElementById('lbList');
      
      const catTeams = Object.entries(teams)
        .filter(([id, t]) => t.category === currentCategory)
        .map(([id, t]) => ({ id, ...t }));
      
      if (catTeams.length === 0) {
        list.innerHTML = '<div class="waiting">Nessun team</div>';
        return;
      }
      
      const catWorkouts = Object.entries(workouts)
        .filter(([id, w]) => !w.categories || w.categories.includes(currentCategory));
      
      // Calculate points
      const teamPoints = catTeams.map(team => {
        let total = 0;
        catWorkouts.forEach(([wodId, wod]) => {
          const scoreKey = `${team.id}_${wodId}`;
          if (scores[scoreKey]) {
            // Simplified: just count completed WODs for now
            total += 1;
          }
        });
        return { ...team, points: total };
      });
      
      teamPoints.sort((a, b) => b.points - a.points);
      
      list.innerHTML = teamPoints.map((t, i) => `
        <div class="lb-row">
          <div class="lb-rank">${i + 1}</div>
          <div class="lb-team">
            <span class="emoji">${t.emoji}</span>
            <span class="name">${t.name}</span>
          </div>
          <div class="lb-points">${t.points}</div>
        </div>
      `).join('');
    }
    
    function listenForHeat() {
      DB.listen(`${basePath}/currentHeat`, (heat) => {
        const container = document.getElementById('timerContent');
        
        if (!heat || heat.status === 'pending') {
          container.innerHTML = `
            <div class="waiting">
              <div class="big">🏋️</div>
              <h2>In attesa della prossima heat...</h2>
            </div>
          `;
          return;
        }
        
        const heatTeams = (heat.lanes || []).map(tid => teams[tid]).filter(Boolean);
        
        if (heat.status === 'countdown') {
          container.innerHTML = `
            <div class="heat-info">Heat ${heat.number || '?'} · <span class="cat">${heat.category || ''}</span></div>
            <div class="wod-name">${heat.wodName || 'WOD'}</div>
            <div class="timer-display countdown" id="countdown">${heat.countdownFrom || 10}</div>
            <div class="lanes">
              ${heatTeams.map((t, i) => `
                <div class="lane">
                  <div class="num">Lane ${i + 1}</div>
                  <div class="emoji">${t.emoji}</div>
                  <div class="name">${t.name}</div>
                </div>
              `).join('')}
            </div>
          `;
          startCountdown(heat.countdownFrom || 10);
        } else if (heat.status === 'running') {
          container.innerHTML = `
            <div class="heat-info">Heat ${heat.number || '?'} · <span class="cat">${heat.category || ''}</span></div>
            <div class="wod-name">${heat.wodName || 'WOD'}</div>
            <div class="timer-display running" id="timer">00:00</div>
            <div class="lanes">
              ${heatTeams.map((t, i) => `
                <div class="lane">
                  <div class="num">Lane ${i + 1}</div>
                  <div class="emoji">${t.emoji}</div>
                  <div class="name">${t.name}</div>
                </div>
              `).join('')}
            </div>
          `;
          startTimer(heat.timeCapSec, heat.startedAt);
        }
      });
    }
    
    let countdownInterval = null;
    function startCountdown(from) {
      if (countdownInterval) clearInterval(countdownInterval);
      let count = from;
      
      countdownInterval = setInterval(() => {
        count--;
        const el = document.getElementById('countdown');
        if (el) {
          if (count > 0) {
            el.textContent = count;
          } else {
            el.textContent = 'GO!';
            clearInterval(countdownInterval);
          }
        }
      }, 1000);
    }
    
    let timerInterval = null;
    function startTimer(timeCapSec, startedAt) {
      if (timerInterval) clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const el = document.getElementById('timer');
        if (!el) return;
        
        if (elapsed >= timeCapSec) {
          el.textContent = 'TIME!';
          el.classList.remove('running');
          el.classList.add('done');
          clearInterval(timerInterval);
          return;
        }
        
        const min = Math.floor(elapsed / 60);
        const sec = elapsed % 60;
        el.textContent = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
      }, 100);
    }
    
    init();
  </script>
</body>
</html>
