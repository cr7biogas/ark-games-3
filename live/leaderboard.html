<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🏆 Leaderboard - ARK Games 3.0</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/live.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    /* Leaderboard specific styles */
    body {
      background: 
        linear-gradient(135deg, rgba(10, 10, 18, 0.98), rgba(26, 26, 46, 0.95)),
        url('../assets/images/texture-grunge.webp') center/cover fixed;
    }
    
    .back-btn {
      position: fixed;
      top: var(--space-4);
      left: var(--space-4);
      color: var(--color-gray);
      text-decoration: none;
      font-size: var(--text-sm);
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--border-radius-md);
      backdrop-filter: blur(10px);
      transition: var(--transition-base);
    }
    .back-btn:hover {
      color: var(--color-white);
      background: var(--color-rust);
    }
    
    .fullscreen-btn {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: var(--border-radius-md);
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(10px);
      transition: var(--transition-base);
    }
    .fullscreen-btn:hover {
      background: var(--color-rust);
    }
    
    .header {
      background: linear-gradient(135deg, var(--color-charcoal), rgba(0, 0, 0, 0.8));
      padding: var(--space-8) var(--space-6);
      text-align: center;
      border-bottom: 2px solid var(--color-rust);
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: var(--weight-black);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }
    .header h1 span {
      color: var(--color-rust);
    }
    .header p {
      color: var(--color-gray);
      font-size: var(--text-base);
      margin-top: var(--space-2);
    }
    
    .tabs {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: rgba(0, 0, 0, 0.5);
      flex-wrap: wrap;
    }
    .tab {
      padding: var(--space-3) var(--space-6);
      border-radius: var(--border-radius-full);
      border: 2px solid transparent;
      background: var(--color-dark-gray);
      color: var(--color-white);
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      cursor: pointer;
      transition: var(--transition-base);
    }
    .tab:hover:not(.active) {
      border-color: var(--color-rust);
    }
    .tab.active {
      background: linear-gradient(135deg, var(--color-rust), var(--color-amber));
      box-shadow: var(--glow-rust);
    }
    
    .content {
      padding: var(--space-6);
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .leaderboard {
      background: var(--color-charcoal);
      border-radius: var(--border-radius-xl);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .lb-header {
      display: grid;
      grid-template-columns: 70px 1fr repeat(var(--wod-count, 4), 90px) 90px;
      padding: var(--space-4) var(--space-5);
      background: rgba(0, 0, 0, 0.4);
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      color: var(--color-gray);
      text-transform: uppercase;
      letter-spacing: var(--tracking-widest);
    }
    
    .lb-row {
      display: grid;
      grid-template-columns: 70px 1fr repeat(var(--wod-count, 4), 90px) 90px;
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      align-items: center;
      transition: var(--transition-base);
    }
    .lb-row:last-child {
      border-bottom: none;
    }
    .lb-row:hover {
      background: rgba(233, 69, 96, 0.1);
    }
    
    .lb-rank {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-black);
      color: var(--color-gray);
    }
    .lb-row:nth-child(1) .lb-rank {
      background: linear-gradient(135deg, #ffd700, #f39c12);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lb-row:nth-child(2) .lb-rank {
      background: linear-gradient(135deg, #c0c0c0, #95a5a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lb-row:nth-child(3) .lb-rank {
      background: linear-gradient(135deg, #cd7f32, #a04000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .lb-team {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .lb-team .emoji {
      font-size: 2rem;
    }
    .lb-team .name {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
    }
    
    .lb-score {
      text-align: center;
    }
    .lb-score .value {
      font-family: var(--font-display);
      font-weight: var(--weight-bold);
      font-size: var(--text-base);
    }
    .lb-score .rank {
      color: var(--color-gray);
      font-size: var(--text-xs);
    }
    
    .lb-total {
      text-align: center;
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-black);
      color: var(--color-teal);
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }
    
    .empty {
      text-align: center;
      padding: var(--space-12);
      color: var(--color-gray);
      font-family: var(--font-display);
      text-transform: uppercase;
    }
    
    @media (max-width: 768px) {
      .lb-header, .lb-row {
        grid-template-columns: 50px 1fr 80px;
      }
      .lb-header > div:not(:first-child):not(:nth-child(2)):not(:last-child),
      .lb-row > div:not(:first-child):not(:nth-child(2)):not(:last-child) {
        display: none;
      }
      .header h1 {
        font-size: var(--text-2xl);
      }
    }
  </style>
</head>
<body>
  <a href="../" class="back-btn">← Home</a>
  <button class="fullscreen-btn" onclick="toggleFullscreen()" aria-label="Toggle fullscreen">⛶</button>
  
  <div class="header">
    <h1 id="compTitle">🏆 <span>ARK</span> GAMES <span class="live-indicator">LIVE</span></h1>
    <p id="compDate"></p>
  </div>
  
  <div class="tabs" id="categoryTabs">
    <!-- Dynamic -->
  </div>
  
  <div class="content">
    <div class="leaderboard" id="leaderboard">
      <div class="empty">
        <div class="loading-spinner" style="margin: 0 auto var(--space-4);"></div>
        Caricamento...
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from '../firebase-config.js';
    
    const urlParams = new URLSearchParams(location.search);
    const compId = urlParams.get('c') || localStorage.getItem('ark2_compId');
    const seasonId = urlParams.get('s') || localStorage.getItem('ark2_seasonId');
    
    const isSeasonMode = !!seasonId && !compId;
    const eventId = isSeasonMode ? seasonId : compId;
    const basePath = isSeasonMode ? `seasons/${seasonId}` : `competitions/${compId}`;
    
    if (compId) localStorage.setItem('ark2_compId', compId);
    if (seasonId) localStorage.setItem('ark2_seasonId', seasonId);
    
    if (!eventId) {
      location.href = 'index.html';
    }
    
    let competition = null;
    let categories = [];
    let currentCategory = null;
    let teams = {};
    let workouts = {};
    let scores = {};
    
    window.toggleFullscreen = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };
    
    async function init() {
      competition = await DB.get(`${basePath}`);
      if (!competition) {
        alert('Gara non trovata');
        location.href = 'index.html';
        return;
      }
      
      document.getElementById('compTitle').innerHTML = `🏆 <span>${competition.name || 'ARK GAMES'}</span> <span class="live-indicator">LIVE</span>`;
      document.getElementById('compDate').textContent = competition.date || '';
      
      categories = competition.categories || ['Experience', 'Scaled', 'Open'];
      currentCategory = categories[0];
      
      renderTabs();
      loadData();
      startAutoRotate();
    }
    
    let autoRotateInterval = null;
    let autoRotateTimeout = null;
    
    function startAutoRotate() {
      if (autoRotateInterval) clearInterval(autoRotateInterval);
      autoRotateInterval = setInterval(() => {
        const idx = categories.indexOf(currentCategory);
        currentCategory = categories[(idx + 1) % categories.length];
        updateActivTab();
        renderLeaderboard();
      }, 30000);
    }
    
    function pauseAutoRotate() {
      if (autoRotateInterval) clearInterval(autoRotateInterval);
      if (autoRotateTimeout) clearTimeout(autoRotateTimeout);
      autoRotateTimeout = setTimeout(startAutoRotate, 60000);
    }
    
    function renderTabs() {
      const container = document.getElementById('categoryTabs');
      container.innerHTML = categories.map(cat => `
        <button class="tab ${cat === currentCategory ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat}</button>
      `).join('');
    }
    
    function updateActivTab() {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.textContent === currentCategory);
      });
    }
    
    window.selectCategory = (cat) => {
      pauseAutoRotate();
      currentCategory = cat;
      updateActivTab();
      renderLeaderboard();
    };
    
    async function loadData() {
      teams = await DB.get(`${basePath}/teams`) || {};
      workouts = await DB.get(`${basePath}/workouts`) || {};
      scores = await DB.get(`${basePath}/scores`) || {};
      
      renderLeaderboard();
      
      DB.listen(`${basePath}/scores`, (newScores) => {
        scores = newScores || {};
        renderLeaderboard();
      });
    }
    
    function renderLeaderboard() {
      const lb = document.getElementById('leaderboard');
      
      const catTeams = Object.entries(teams)
        .filter(([id, t]) => t.category === currentCategory)
        .map(([id, t]) => ({ id, ...t }));
      
      if (catTeams.length === 0) {
        lb.innerHTML = '<div class="empty">Nessun team in questa categoria</div>';
        return;
      }
      
      const catWorkouts = Object.entries(workouts)
        .filter(([id, w]) => !w.categories || w.categories.includes(currentCategory))
        .map(([id, w]) => ({ id, ...w }));
      
      const wodCount = catWorkouts.length;
      lb.style.setProperty('--wod-count', wodCount);
      
      const wodRankings = {};
      catWorkouts.forEach(wod => {
        const wodScores = catTeams.map(team => {
          const scoreKey = `${team.id}_${wod.id}`;
          const score = scores[scoreKey];
          return {
            teamId: team.id,
            time: score?.time,
            reps: score?.reps,
            hasScore: !!score
          };
        }).filter(s => s.hasScore);
        
        if (wod.type === 'fortime') {
          wodScores.sort((a, b) => {
            if (a.time && b.time) return a.time - b.time;
            if (a.time) return -1;
            if (b.time) return 1;
            return (b.reps || 0) - (a.reps || 0);
          });
        } else {
          wodScores.sort((a, b) => (b.reps || 0) - (a.reps || 0));
        }
        
        wodRankings[wod.id] = {};
        wodScores.forEach((s, i) => {
          wodRankings[wod.id][s.teamId] = {
            rank: i + 1,
            time: s.time,
            reps: s.reps
          };
        });
      });
      
      const teamPoints = catTeams.map(team => {
        let total = 0;
        catWorkouts.forEach(wod => {
          const ranking = wodRankings[wod.id]?.[team.id];
          if (ranking) {
            total += ranking.rank;
          } else {
            total += catTeams.length;
          }
        });
        return { ...team, total };
      });
      
      teamPoints.sort((a, b) => a.total - b.total);
      
      lb.innerHTML = `
        <div class="lb-header">
          <div>#</div>
          <div>Team</div>
          ${catWorkouts.map(w => `<div style="text-align:center">${w.name}</div>`).join('')}
          <div style="text-align:center">Tot</div>
        </div>
        ${teamPoints.map((team, i) => `
          <div class="lb-row">
            <div class="lb-rank">${i < 3 ? ['🥇','🥈','🥉'][i] : i + 1}</div>
            <div class="lb-team">
              <span class="emoji">${team.emoji}</span>
              <span class="name">${team.name}</span>
            </div>
            ${catWorkouts.map(wod => {
              const ranking = wodRankings[wod.id]?.[team.id];
              if (!ranking) return '<div class="lb-score"><span class="value">-</span></div>';
              
              let display = '';
              if (ranking.time) {
                const m = Math.floor(ranking.time / 60);
                const s = ranking.time % 60;
                display = `${m}:${s.toString().padStart(2, '0')}`;
              } else if (ranking.reps) {
                display = ranking.reps;
              }
              
              return `
                <div class="lb-score">
                  <div class="value">${display}</div>
                  <div class="rank">${ranking.rank}°</div>
                </div>
              `;
            }).join('')}
            <div class="lb-total">${team.total}</div>
          </div>
        `).join('')}
      `;
    }
    
    init();
  </script>
</body>
</html>
