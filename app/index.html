<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gare Disponibili - ARK Games 3.0</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    /* Hero adjustments for athlete page */
    .page-hero {
      min-height: 180px;
    }
    
    /* Competition type badges */
    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      border-radius: var(--border-radius-full);
      background: rgba(255, 255, 255, 0.1);
      color: var(--color-gray);
    }
    
    .type-badge.team {
      background: rgba(0, 212, 255, 0.15);
      color: var(--color-teal);
    }
    
    .type-badge.individual {
      background: rgba(243, 156, 18, 0.15);
      color: var(--color-amber);
    }
    
    /* Profile button */
    .profile-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--border-radius-full);
      background: linear-gradient(135deg, var(--color-teal), var(--color-teal-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: none;
      cursor: pointer;
      transition: var(--transition-base);
    }
    
    .profile-btn:hover {
      transform: scale(1.1);
    }
    
    /* Search bar */
    .search-container {
      padding: var(--space-4) var(--space-6);
      background: rgba(0, 0, 0, 0.3);
    }
    
    .search-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      padding-left: 44px;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-white);
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius-full);
      transition: var(--transition-base);
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--color-teal);
      background: rgba(255, 255, 255, 0.08);
    }
    
    .search-wrapper {
      position: relative;
    }
    
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-gray);
      pointer-events: none;
    }
    
    /* Card enhancements */
    .game-card-header {
      background: linear-gradient(135deg, var(--color-dark-gray), var(--color-charcoal));
      position: relative;
    }
    
    .game-card-header .card-icon {
      position: absolute;
      bottom: -20px;
      left: 20px;
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--color-rust), var(--color-amber));
      border-radius: var(--border-radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: var(--shadow-md);
    }
    
    .game-card-body {
      padding-top: var(--space-8);
    }
    
    /* No results */
    .no-results {
      text-align: center;
      padding: var(--space-12);
      color: var(--color-gray);
    }
    
    .no-results svg {
      width: 64px;
      height: 64px;
      margin-bottom: var(--space-4);
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="../" class="navbar-brand">
      <span class="navbar-brand-text"><span>ARK</span> GAMES</span>
    </a>
    <div class="navbar-actions">
      <button class="profile-btn" onclick="window.location.href='profilo.html'" title="Profilo">
        👤
      </button>
    </div>
  </nav>

  <!-- Page Hero -->
  <section class="page-hero">
    <picture class="page-hero-bg">
      <source srcset="../assets/images/app/app-hero.webp" type="image/webp">
      <img src="../assets/images/app/app-hero.jpg" alt="Arena" loading="eager">
    </picture>
    <div class="page-hero-content">
      <div class="page-hero-icon">⚔️</div>
      <h1>Arena</h1>
      <p>Scegli la tua battaglia</p>
    </div>
  </section>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all')">🔥 Tutte</button>
    <button class="tab" onclick="switchTab('upcoming')">📅 Prossime</button>
    <button class="tab" onclick="switchTab('live')">🔴 Live</button>
    <button class="tab" onclick="switchTab('season')">🏆 Season</button>
  </div>

  <!-- Search -->
  <div class="search-container">
    <div class="search-wrapper">
      <svg class="search-icon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Cerca gara..." oninput="filterGames()">
    </div>
  </div>

  <!-- Content -->
  <div class="page-content">
    <div class="cards-grid" id="cardsGrid">
      <!-- Cards loaded dynamically -->
    </div>
    
    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">🏟️</div>
      <h3>Nessuna Gara Disponibile</h3>
      <p>Non ci sono competizioni al momento. Torna presto!</p>
    </div>
    
    <!-- No Results -->
    <div class="no-results" id="noResults" style="display: none;">
      <svg fill="currentColor" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <h3>Nessun risultato</h3>
      <p>Prova con un altro termine di ricerca</p>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>

  <script>
    let allGames = [];
    let allSeasons = [];
    let currentTab = 'all';

    async function loadData() {
      const grid = document.getElementById('cardsGrid');
      const emptyState = document.getElementById('emptyState');
      
      grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--color-gray);">Caricamento arena...</div>';
      
      try {
        // Load competitions and seasons
        const [compSnap, seasonSnap] = await Promise.all([
          firebase.database().ref('ark_competitions').once('value'),
          firebase.database().ref('ark_seasons').once('value')
        ]);
        
        const compData = compSnap.val() || {};
        const seasonData = seasonSnap.val() || {};
        
        // Convert to arrays
        allGames = Object.entries(compData).map(([id, data]) => ({
          id,
          ...data,
          type: 'competition'
        }));
        
        allSeasons = Object.entries(seasonData).map(([id, data]) => ({
          id,
          ...data,
          type: 'season'
        }));
        
        if (allGames.length === 0 && allSeasons.length === 0) {
          grid.innerHTML = '';
          emptyState.style.display = 'block';
          return;
        }
        
        emptyState.style.display = 'none';
        filterGames();
      } catch (error) {
        console.error('Load error:', error);
        grid.innerHTML = '<div style="color: var(--color-danger); text-align: center; padding: 40px;">Errore di caricamento</div>';
      }
    }
    
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      filterGames();
    }
    
    function filterGames() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const grid = document.getElementById('cardsGrid');
      const emptyState = document.getElementById('emptyState');
      const noResults = document.getElementById('noResults');
      
      let items = [];
      
      // Filter by tab
      if (currentTab === 'season') {
        items = allSeasons;
      } else if (currentTab === 'live') {
        items = allGames.filter(g => g.status === 'live');
      } else if (currentTab === 'upcoming') {
        items = allGames.filter(g => g.status === 'upcoming' || !g.status);
      } else {
        items = [...allGames];
      }
      
      // Filter by search
      if (searchTerm) {
        items = items.filter(g => 
          (g.name || '').toLowerCase().includes(searchTerm) ||
          (g.description || '').toLowerCase().includes(searchTerm)
        );
      }
      
      // Sort by date (newest first)
      items.sort((a, b) => {
        const dateA = a.createdAt || a.date || 0;
        const dateB = b.createdAt || b.date || 0;
        return dateB - dateA;
      });
      
      grid.innerHTML = '';
      
      if (items.length === 0) {
        if (searchTerm) {
          noResults.style.display = 'block';
          emptyState.style.display = 'none';
        } else {
          noResults.style.display = 'none';
          emptyState.style.display = 'block';
        }
        return;
      }
      
      noResults.style.display = 'none';
      emptyState.style.display = 'none';
      
      items.forEach(item => {
        const card = createCard(item);
        grid.appendChild(card);
      });
    }
    
    function createCard(item) {
      const div = document.createElement('div');
      div.className = 'game-card';
      
      const isLive = item.status === 'live';
      const isSeason = item.type === 'season';
      const athleteCount = item.athletes ? Object.keys(item.athletes).length : 0;
      const wodCount = item.workouts ? Object.keys(item.workouts).length : (item.wods ? Object.keys(item.wods).length : 0);
      
      let badgeClass = isLive ? 'live' : (isSeason ? 'upcoming' : 'upcoming');
      let badgeText = isLive ? '🔴 LIVE' : (isSeason ? '🏆 SEASON' : 'PROSSIMA');
      
      let icon = isSeason ? '🏆' : '⚔️';
      let detailUrl = isSeason ? `season.html?id=${item.id}` : `gara.html?id=${item.id}`;
      
      div.innerHTML = `
        <div class="game-card-header">
          <span class="game-card-badge ${badgeClass}">${badgeText}</span>
          <div class="card-icon">${icon}</div>
        </div>
        <div class="game-card-body">
          <h3 class="game-card-title">${item.name || 'Senza nome'}</h3>
          <div class="game-card-meta">
            <span class="game-card-meta-item">👥 ${athleteCount}</span>
            <span class="game-card-meta-item">💪 ${wodCount} WOD</span>
            ${item.teamBased ? '<span class="type-badge team">TEAM</span>' : '<span class="type-badge individual">INDIVIDUALE</span>'}
          </div>
        </div>
        <div class="game-card-footer">
          <span class="game-card-action">ENTRA →</span>
        </div>
      `;
      
      div.onclick = () => window.location.href = detailUrl;
      return div;
    }

    // Init
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
