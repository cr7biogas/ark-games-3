<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>📷 ARK Camera WebRTC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
    .container { height: 100%; display: flex; flex-direction: column; }
    video { flex: 1; width: 100%; object-fit: cover; }
    
    .overlay {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 15px;
      background: linear-gradient(rgba(0,0,0,0.8), transparent);
      display: flex; justify-content: space-between; align-items: center;
    }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.offline { background: #e74c3c; }
    .dot.connecting { background: #f1c40f; animation: blink 1s infinite; }
    .dot.online { background: #2ecc71; }
    @keyframes blink { 50% { opacity: 0.3; } }
    .cam-name { background: #e94560; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      padding: 40px 20px 20px;
    }
    .info { text-align: center; margin-bottom: 20px; }
    .info .label { font-size: 11px; color: #888; margin-bottom: 5px; }
    .info .value { font-size: 24px; font-weight: 700; color: #2ecc71; }
    .info .sub { font-size: 12px; color: #666; margin-top: 5px; }
    .controls { display: flex; gap: 10px; justify-content: center; }
    .btn { padding: 12px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #e94560; color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    .stats { display: flex; justify-content: center; gap: 20px; margin-top: 15px; font-size: 11px; color: #666; }
    .stats span { color: #fff; }
    
    .setup {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px; z-index: 100;
    }
    .setup.hidden { display: none; }
    .setup .logo { font-size: 70px; margin-bottom: 15px; }
    .setup h1 { font-size: 26px; margin-bottom: 8px; }
    .setup p { color: #888; font-size: 14px; margin-bottom: 30px; text-align: center; }
    .setup input, .setup select {
      width: 100%; max-width: 280px; padding: 15px; border-radius: 12px;
      border: 2px solid #333; background: rgba(255,255,255,0.05);
      color: white; font-size: 16px; text-align: center; margin-bottom: 15px;
    }
    .setup input:focus, .setup select:focus { outline: none; border-color: #e94560; }
    .setup .btn { width: 100%; max-width: 280px; }
    .setup .error { background: rgba(231,76,60,0.2); color: #e74c3c; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; max-width: 280px; }
    .setup .error.hidden { display: none; }
  </style>
</head>
<body>
  <div class="setup" id="setup">
    <div class="logo">📷</div>
    <h1>ARK Camera</h1>
    <p>Connetti questo telefono come camera WebRTC</p>
    <div class="error hidden" id="error"></div>
    <select id="position" style="font-size:18px;">
      <option value="0">📍 Lane 1</option>
      <option value="1">📍 Lane 2</option>
      <option value="2">📍 Lane 3</option>
      <option value="3">📍 Overview</option>
    </select>
    <select id="quality">
      <option value="1080">1080p (Full HD) ⭐</option>
      <option value="720" selected>720p (HD) - Consigliato</option>
      <option value="480">480p (SD) - Risparmio batteria</option>
      <option value="360">360p (Low)</option>
    </select>
    <button class="btn btn-primary" onclick="start()">📹 Avvia Camera</button>
  </div>
  
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    <div class="overlay">
      <div class="status">
        <div class="dot offline" id="dot"></div>
        <span id="statusText">Offline</span>
      </div>
      <div class="cam-name" id="nameLabel">Camera</div>
      <a href="index.html" style="background:rgba(255,255,255,0.2);padding:6px 12px;border-radius:20px;text-decoration:none;color:white;font-size:12px;">🏠</a>
    </div>
    <div class="bottom-panel">
      <div class="info">
        <div class="label">CAMERA ID</div>
        <div class="value" id="camId">---</div>
        <div class="sub" id="connInfo">In attesa di connessione...</div>
      </div>
      <div class="controls">
        <button class="btn btn-secondary" onclick="switchCam()">🔄 Flip</button>
        <button class="btn btn-secondary" onclick="toggleFlash()">💡 Flash</button>
        <button class="btn btn-primary" onclick="stop()">⏹️ Stop</button>
      </div>
      <div class="stats">
        Viewers: <span id="viewerCount">0</span> |
        Bitrate: <span id="bitrate">0 kbps</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    
    // Get compId from URL - REQUIRED for multi-tenant
    const params = new URLSearchParams(location.search);
    const compId = params.get('c');
    if (!compId) {
      document.getElementById('error').textContent = '❌ Manca parametro ?c=compId';
      document.getElementById('error').classList.remove('hidden');
      document.querySelector('.btn-primary').disabled = true;
    }
    
    const ICE_SERVERS = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ];
    const HEARTBEAT_INTERVAL = 5000;
    const VIEWER_IDS = ['viewer', 'obs', 'output']; // Support multiple viewers
    
    // Paths isolated per competition
    const streamsPath = `competitions/${compId}/streams`;
    
    let camId = null;
    let camName = '';
    let quality = '720';
    let stream = null;
    let facingMode = 'environment';
    let heartbeatInterval = null;
    
    // Multiple peer connections - one per viewer
    const viewers = new Map(); // viewerId -> { pc, addedCandidates, unsubscribers }
    
    function log(msg) { console.log(`[Camera ${camId || '?'}] ${msg}`); }
    
    function setStatus(status, text) {
      document.getElementById('dot').className = 'dot ' + status;
      document.getElementById('statusText').textContent = text;
    }
    
    function updateViewerCount() {
      let count = 0;
      viewers.forEach(v => { if (v.pc?.connectionState === 'connected') count++; });
      document.getElementById('viewerCount').textContent = count;
      document.getElementById('connInfo').textContent = count > 0 ? `${count} viewer connessi` : 'In attesa...';
      setStatus(count > 0 ? 'online' : 'connecting', count > 0 ? 'Live' : 'In attesa...');
    }
    
    window.start = async () => {
      const position = parseInt(document.getElementById('position').value);
      const positionNames = ['Lane 1', 'Lane 2', 'Lane 3', 'Overview'];
      camName = positionNames[position];
      quality = document.getElementById('quality').value;
      
      const res = { '1080': {w:1920,h:1080}, '720': {w:1280,h:720}, '480': {w:854,h:480}, '360': {w:640,h:360} }[quality];
      
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: res.w }, height: { ideal: res.h }, frameRate: { ideal: 30 } },
          audio: false
        });
        
        document.getElementById('video').srcObject = stream;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('nameLabel').textContent = camName;
        
        // Wake lock
        if ('wakeLock' in navigator) {
          try { await navigator.wakeLock.request('screen'); } catch(e) {}
        }
        
        camId = 'cam_' + Math.random().toString(36).substr(2, 8);
        document.getElementById('camId').textContent = camId;
        
        // Register with position for auto-assignment
        await DB.set(`${streamsPath}/${camId}`, {
          name: camName, quality, status: 'waiting',
          position: position, // 0=Lane1, 1=Lane2, 2=Lane3, 3=Overview
          createdAt: Date.now(), lastHeartbeat: Date.now()
        });
        
        setStatus('connecting', 'In attesa...');
        
        // Listen for ALL viewer offers
        VIEWER_IDS.forEach(viewerId => listenForViewer(viewerId));
        
        // Heartbeat
        heartbeatInterval = setInterval(async () => {
          await DB.update(`${streamsPath}/${camId}`, { lastHeartbeat: Date.now() });
        }, HEARTBEAT_INTERVAL);
        
        log('Camera started, listening for viewers: ' + VIEWER_IDS.join(', '));
        
      } catch (e) {
        document.getElementById('error').textContent = '❌ ' + e.message;
        document.getElementById('error').classList.remove('hidden');
      }
    };
    
    function listenForViewer(viewerId) {
      const offerPath = `${streamsPath}/${camId}/${viewerId}Offer`;
      
      DB.listen(offerPath, async (offer) => {
        if (!offer) return;
        
        log(`Offer from ${viewerId}`);
        
        // Cleanup old connection for this viewer
        if (viewers.has(viewerId)) {
          const old = viewers.get(viewerId);
          old.unsubscribers.forEach(fn => fn?.());
          old.pc?.close();
        }
        
        await createPeerConnection(viewerId, offer);
      });
    }
    
    async function createPeerConnection(viewerId, offer) {
      const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      const viewer = { pc, addedCandidates: new Set(), unsubscribers: [] };
      viewers.set(viewerId, viewer);
      
      // Add stream
      stream.getTracks().forEach(track => pc.addTrack(track, stream));
      
      // ICE candidates
      pc.onicecandidate = async (e) => {
        if (e.candidate && !e.candidate.candidate.includes('.local')) {
          const id = `${Date.now()}_${Math.random().toString(36).substr(2,4)}`;
          await DB.set(`${streamsPath}/${camId}/${viewerId}CameraCandidates/${id}`, e.candidate.toJSON());
        }
      };
      
      // State
      pc.onconnectionstatechange = () => {
        log(`${viewerId}: ${pc.connectionState}`);
        updateViewerCount();
        if (pc.connectionState === 'connected') {
          DB.update(`${streamsPath}/${camId}`, { status: 'streaming' });
        }
      };
      
      // Set offer
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      
      // Create answer
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await DB.set(`${streamsPath}/${camId}/${viewerId}Answer`, { type: answer.type, sdp: answer.sdp });
      
      log(`Answer sent to ${viewerId}`);
      
      // Listen for viewer candidates
      const unsub = DB.listen(`${streamsPath}/${camId}/${viewerId}Candidates`, async (cands) => {
        if (!cands || !pc) return;
        for (const [id, cand] of Object.entries(cands)) {
          if (viewer.addedCandidates.has(id)) continue;
          try {
            await pc.addIceCandidate(new RTCIceCandidate(cand));
            viewer.addedCandidates.add(id);
          } catch(e) {}
        }
      });
      viewer.unsubscribers.push(unsub);
    }
    
    window.switchCam = async () => {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      const res = { '1080': {w:1920,h:1080}, '720': {w:1280,h:720}, '480': {w:854,h:480}, '360': {w:640,h:360} }[quality];
      
      const oldStream = stream;
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: res.w }, height: { ideal: res.h } },
        audio: false
      });
      
      document.getElementById('video').srcObject = stream;
      
      // Replace track in ALL peer connections
      const newTrack = stream.getVideoTracks()[0];
      viewers.forEach(v => {
        const sender = v.pc?.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(newTrack);
      });
      
      oldStream.getTracks().forEach(t => t.stop());
    };
    
    window.toggleFlash = async () => {
      const track = stream?.getVideoTracks()[0];
      try {
        const caps = track?.getCapabilities?.();
        if (caps?.torch) {
          const settings = track.getSettings();
          await track.applyConstraints({ advanced: [{ torch: !settings.torch }] });
        } else {
          alert('Flash non disponibile');
        }
      } catch (e) {}
    };
    
    window.stop = async () => {
      clearInterval(heartbeatInterval);
      viewers.forEach(v => {
        v.unsubscribers.forEach(fn => fn?.());
        v.pc?.close();
      });
      stream?.getTracks().forEach(t => t.stop());
      if (camId) await DB.remove(`${streamsPath}/${camId}`);
      location.reload();
    };
    
    window.addEventListener('pagehide', () => {
      if (camId) DB.remove(`${streamsPath}/${camId}`);
    });
  </script>
</body>
</html>
