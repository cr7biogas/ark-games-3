<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regia - ARK GAMES</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/regia.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>

  <section class="hero-section">
    <picture class="hero-bg">
      <source srcset="../assets/images/regia/regia-hero.webp" type="image/webp">
      <img src="../assets/images/regia/regia-hero.jpg" alt="Control Room" loading="eager">
    </picture>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="back-link"><a href="../index.html">← ARENA</a></div>
      <h1 class="page-title">
        <span class="title-icon">🎬</span>
        <span class="title-text">REGIA</span>
      </h1>
      <p class="page-subtitle">Director's chair. Total control.</p>
    </div>
  </section>

  <section class="actions-section">
    <div class="container">
      <div class="action-grid">
        
        <div class="action-card">
          <div class="card-header">
            <span class="card-icon">🎛️</span>
            <h2 class="card-title">CONSOLE</h2>
          </div>
          <div class="card-body"><p>Control room. Heat timing. Timeline management.</p></div>
          <div class="card-footer"><a href="../regia.html" class="btn btn-primary">CONTROLLA →</a></div>
        </div>
        
        <div class="action-card">
          <div class="card-header">
            <span class="card-icon">📹</span>
            <h2 class="card-title">CAMERA</h2>
          </div>
          <div class="card-body"><p>Multi-cam setup. WebRTC streaming.</p></div>
          <div class="card-footer"><a href="../camera-webrtc.html" class="btn btn-secondary">SETUP →</a></div>
        </div>
        
        <div class="action-card">
          <div class="card-header">
            <span class="card-icon">📡</span>
            <h2 class="card-title">STREAM</h2>
          </div>
          <div class="card-body"><p>Ricevi stream. Multi-camera viewer.</p></div>
          <div class="card-footer"><a href="../stream-webrtc.html" class="btn btn-secondary">VEDI →</a></div>
        </div>
        
      </div>
    </div>
  </section>

  <footer class="section-footer">
    <p class="footer-text">DIRECT THE SHOW</p>
  </footer>

</body>
</html>
