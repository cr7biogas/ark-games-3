<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARK GAMES - Where Warriors Are Forged</title>
  <link rel="stylesheet" href="assets/css/homepage.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <picture class="hero-bg">
      <source srcset="assets/images/hero-background.webp" type="image/webp">
      <img src="assets/images/hero-background.jpg" alt="Underground CrossFit Arena" loading="eager">
    </picture>
    
    <div class="hero-overlay">
      <div class="hero-content">
        <div class="claw-icon">
          <picture>
            <source srcset="assets/images/icon-claw.webp" type="image/webp">
            <img src="assets/images/icon-claw.jpg" alt="ARK Claw" loading="eager">
          </picture>
        </div>
        
        <h1 class="hero-title">
          <span class="ark-text">ARK</span>
          <span class="games-text">GAMES</span>
        </h1>
        
        <p class="hero-tagline">WHERE WARRIORS ARE FORGED</p>
        
        <a href="#battle-modes" class="cta-button">
          ENTER THE ARENA →
        </a>
      </div>
    </div>
    
    <!-- Texture overlay -->
    <div class="texture-overlay"></div>
  </section>

  <!-- Battle Modes Section -->
  <section class="battle-modes" id="battle-modes">
    <div class="container">
      
      <!-- Card 1: Atleta -->
      <div class="battle-card fighter">
        <picture class="card-bg">
          <source srcset="assets/images/card-atleta.webp" type="image/webp">
          <img src="assets/images/card-atleta.jpg" alt="Atleta Fighter" loading="lazy">
        </picture>
        
        <div class="card-overlay"></div>
        
        <div class="card-content">
          <div class="card-icon">💪</div>
          <h2 class="card-title">SEI UN ATLETA</h2>
          <p class="card-description">Entra nell'arena.<br>Dimostra chi sei.</p>
          <a href="/app/" class="card-button">BATTAGLIA →</a>
        </div>
      </div>
      
      <!-- Card 2: Organizzatore -->
      <div class="battle-card architect">
        <picture class="card-bg">
          <source srcset="assets/images/card-organizzatore.webp" type="image/webp">
          <img src="assets/images/card-organizzatore.jpg" alt="Architect" loading="lazy">
        </picture>
        
        <div class="card-overlay"></div>
        
        <div class="card-content">
          <div class="card-icon">⚙️</div>
          <h2 class="card-title">ORGANIZZA</h2>
          <p class="card-description">Costruisci l'arena.<br>Crea le battaglie.</p>
          <a href="/admin/" class="card-button">COMANDA →</a>
        </div>
      </div>
      
      <!-- Card 3: Live -->
      <div class="battle-card warroom">
        <picture class="card-bg">
          <source srcset="assets/images/card-live.webp" type="image/webp">
          <img src="assets/images/card-live.jpg" alt="War Room" loading="lazy">
        </picture>
        
        <div class="card-overlay"></div>
        
        <div class="card-content">
          <div class="card-icon">🔴</div>
          <h2 class="card-title">GUERRA IN CORSO</h2>
          <p class="card-description">Segui la battaglia.<br>Witness greatness.</p>
          <a href="/live/" class="card-button">GUARDA →</a>
        </div>
      </div>
      
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-stamp">
      <picture>
        <source srcset="assets/images/badge-stamp.webp" type="image/webp">
        <img src="assets/images/badge-stamp.jpg" alt="ARK Games Quality Control" loading="lazy">
      </picture>
    </div>
    <p class="footer-text">UNDERGROUND BRAND WAR</p>
  </footer>

</body>
</html>
