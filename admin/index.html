<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - ARK Games 3.0</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    /* Texture background */
    .login-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('../assets/images/texture-grunge.webp') center/cover;
      opacity: 0.08;
      pointer-events: none;
    }
    
    /* Animated chains decoration */
    .chains-left, .chains-right {
      position: fixed;
      top: 0;
      width: 60px;
      height: 100%;
      background: url('../assets/images/texture-chainlink.webp') repeat-y;
      opacity: 0.1;
      pointer-events: none;
    }
    .chains-left { left: 0; }
    .chains-right { right: 0; }
    
    /* Logo animation */
    .login-logo-icon {
      animation: iconGlow 3s ease-in-out infinite;
    }
    @keyframes iconGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); }
      50% { box-shadow: 0 0 40px rgba(233, 69, 96, 0.8), 0 0 60px rgba(243, 156, 18, 0.4); }
    }
    
    /* Error shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .shake { animation: shake 0.3s ease; }
    
    /* Success state */
    .login-box.success {
      border-color: var(--color-success);
      box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
    }
    
    /* Dashboard layout */
    .dashboard-screen {
      display: none;
      min-height: 100vh;
    }
    .dashboard-screen.active {
      display: block;
    }
    
    .login-screen.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Decorative chains -->
  <div class="chains-left"></div>
  <div class="chains-right"></div>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box" id="loginBox">
      <div class="login-logo">
        <div class="login-logo-icon">⚔️</div>
        <h1>ARK GAMES</h1>
        <p>Command Center</p>
      </div>
      
      <form class="login-form" id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input 
            type="email" 
            class="form-input" 
            id="emailInput"
            placeholder="admin@arkgames.it"
            autocomplete="email"
            required
          >
        </div>
        
        <div class="form-group">
          <label class="form-label">PIN di Accesso</label>
          <div class="pin-container" id="pinContainer">
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="0">
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="1">
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="2">
            <input type="tel" class="pin-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="3">
          </div>
          <p id="pinError" class="form-error" style="display: none; text-align: center;">PIN errato. Riprova.</p>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: var(--space-4);" onclick="attemptLogin()">
          ENTRA NELL'ARENA →
        </button>
      </form>
      
      <p style="text-align: center; color: var(--color-gray); font-size: var(--text-sm); margin-top: var(--space-6);">
        Solo per organizzatori autorizzati
      </p>
    </div>
  </div>

  <!-- Dashboard (after login) -->
  <div class="dashboard-screen" id="dashboardScreen">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="../" class="navbar-brand">
        <span class="navbar-brand-text"><span>ARK</span> GAMES</span>
      </a>
      <div class="navbar-actions">
        <span id="userEmail" style="color: var(--color-gray); font-size: var(--text-sm); margin-right: var(--space-3);"></span>
        <button class="navbar-btn" onclick="logout()" title="Logout">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- Page Hero -->
    <section class="page-hero">
      <picture class="page-hero-bg">
        <source srcset="../assets/images/admin/admin-hero.webp" type="image/webp">
        <img src="../assets/images/admin/admin-hero.jpg" alt="Command Center" loading="eager">
      </picture>
      <div class="page-hero-content">
        <div class="page-hero-icon">🎮</div>
        <h1>Command Center</h1>
        <p>Crea e gestisci le tue competizioni</p>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('gare')">🏆 Gare</button>
      <button class="tab" onclick="switchTab('season')">📅 Season</button>
      <button class="tab" onclick="switchTab('wods')">💪 WODs</button>
    </div>

    <!-- Content -->
    <div class="page-content">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-value" id="statGare">0</div>
          <div class="stat-card-label">Gare Totali</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="statAtleti">0</div>
          <div class="stat-card-label">Atleti</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="statWods">0</div>
          <div class="stat-card-label">WODs</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="statLive">0</div>
          <div class="stat-card-label">Live Ora</div>
        </div>
      </div>

      <!-- Cards Grid -->
      <div class="cards-grid" id="cardsGrid">
        <!-- Cards loaded dynamically -->
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-state-icon">⚔️</div>
        <h3>Nessuna Battaglia</h3>
        <p>Crea la tua prima competizione e porta i guerrieri nell'arena.</p>
        <button class="btn btn-primary" onclick="createNew()">+ CREA GARA</button>
      </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="createNew()" title="Crea nuovo">
      <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
      </svg>
    </button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>

  <script>
    // ========== PIN INPUT LOGIC ==========
    const pinDigits = document.querySelectorAll('.pin-digit');
    
    pinDigits.forEach((digit, index) => {
      digit.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val;
        
        if (val && index < pinDigits.length - 1) {
          pinDigits[index + 1].focus();
        }
        
        if (val) {
          e.target.classList.add('filled');
        }
        
        // Auto-submit when all filled
        const fullPin = getPin();
        if (fullPin.length === 4) {
          attemptLogin();
        }
      });
      
      digit.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          pinDigits[index - 1].focus();
          pinDigits[index - 1].value = '';
          pinDigits[index - 1].classList.remove('filled');
        }
      });
      
      digit.addEventListener('paste', (e) => {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text');
        const digits = paste.replace(/[^0-9]/g, '').slice(0, 4).split('');
        
        digits.forEach((d, i) => {
          if (pinDigits[i]) {
            pinDigits[i].value = d;
            pinDigits[i].classList.add('filled');
          }
        });
        
        if (digits.length === 4) {
          attemptLogin();
        }
      });
    });
    
    function getPin() {
      return Array.from(pinDigits).map(d => d.value).join('');
    }
    
    function clearPin() {
      pinDigits.forEach(d => {
        d.value = '';
        d.classList.remove('filled');
      });
      pinDigits[0].focus();
    }

    // ========== AUTH ==========
    const VALID_CREDENTIALS = {
      'eugenio.morsani@live.it': '1234',
      'admin@arkgames.it': '1234'
    };
    
    function attemptLogin() {
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const pin = getPin();
      const loginBox = document.getElementById('loginBox');
      const pinError = document.getElementById('pinError');
      
      if (!email || pin.length !== 4) return;
      
      if (VALID_CREDENTIALS[email] === pin) {
        // Success
        pinError.style.display = 'none';
        loginBox.classList.add('success');
        
        // Save session
        localStorage.setItem('arkAdminEmail', email);
        localStorage.setItem('arkAdminSession', Date.now().toString());
        
        setTimeout(() => {
          showDashboard(email);
        }, 500);
      } else {
        // Error
        pinError.style.display = 'block';
        loginBox.classList.add('shake');
        setTimeout(() => loginBox.classList.remove('shake'), 300);
        clearPin();
      }
    }
    
    function showDashboard(email) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboardScreen').classList.add('active');
      document.getElementById('userEmail').textContent = email;
      loadData();
    }
    
    function logout() {
      localStorage.removeItem('arkAdminEmail');
      localStorage.removeItem('arkAdminSession');
      location.reload();
    }
    
    function checkSession() {
      const email = localStorage.getItem('arkAdminEmail');
      const session = localStorage.getItem('arkAdminSession');
      
      if (email && session) {
        const sessionAge = Date.now() - parseInt(session);
        const maxAge = 7 * 24 * 60 * 60 * 1000; // 7 days
        
        if (sessionAge < maxAge) {
          showDashboard(email);
          return true;
        }
      }
      return false;
    }

    // ========== DATA ==========
    let currentTab = 'gare';
    
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadData();
    }
    
    async function loadData() {
      const grid = document.getElementById('cardsGrid');
      const emptyState = document.getElementById('emptyState');
      
      grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--color-gray);">Caricamento...</div>';
      
      try {
        let path = '';
        switch(currentTab) {
          case 'gare': path = 'ark_competitions'; break;
          case 'season': path = 'ark_seasons'; break;
          case 'wods': path = 'ark_wods'; break;
        }
        
        const snapshot = await firebase.database().ref(path).once('value');
        const data = snapshot.val();
        
        if (!data) {
          grid.innerHTML = '';
          emptyState.style.display = 'block';
          updateStats({});
          return;
        }
        
        emptyState.style.display = 'none';
        renderCards(data);
        updateStats(data);
      } catch (error) {
        console.error('Load error:', error);
        grid.innerHTML = '<div style="color: var(--color-danger); text-align: center; padding: 40px;">Errore di caricamento</div>';
      }
    }
    
    function renderCards(data) {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      
      const entries = Object.entries(data).sort((a, b) => {
        const dateA = a[1].createdAt || a[1].date || 0;
        const dateB = b[1].createdAt || b[1].date || 0;
        return dateB - dateA;
      });
      
      entries.forEach(([id, item]) => {
        const card = createCard(id, item);
        grid.appendChild(card);
      });
    }
    
    function createCard(id, item) {
      const div = document.createElement('div');
      div.className = 'game-card';
      
      const isLive = item.status === 'live';
      const isUpcoming = item.status === 'upcoming' || !item.status;
      const athleteCount = item.athletes ? Object.keys(item.athletes).length : 0;
      const wodCount = item.workouts ? Object.keys(item.workouts).length : 0;
      
      let badgeClass = isLive ? 'live' : (isUpcoming ? 'upcoming' : 'completed');
      let badgeText = isLive ? '🔴 LIVE' : (isUpcoming ? 'PROSSIMA' : 'COMPLETATA');
      
      let editUrl = '';
      switch(currentTab) {
        case 'gare': editUrl = `gara.html?id=${id}`; break;
        case 'season': editUrl = `season.html?id=${id}`; break;
        case 'wods': editUrl = `wods.html?id=${id}`; break;
      }
      
      div.innerHTML = `
        <div class="game-card-header">
          <span class="game-card-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="game-card-body">
          <h3 class="game-card-title">${item.name || 'Senza nome'}</h3>
          <div class="game-card-meta">
            <span class="game-card-meta-item">👥 ${athleteCount} atleti</span>
            <span class="game-card-meta-item">💪 ${wodCount} WODs</span>
          </div>
        </div>
        <div class="game-card-footer">
          <span class="game-card-action">GESTISCI →</span>
          <button class="navbar-btn" onclick="event.stopPropagation(); deleteItem('${id}')" title="Elimina">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
          </button>
        </div>
      `;
      
      div.onclick = () => window.location.href = editUrl;
      return div;
    }
    
    function updateStats(data) {
      const count = data ? Object.keys(data).length : 0;
      
      switch(currentTab) {
        case 'gare':
          document.getElementById('statGare').textContent = count;
          break;
        case 'wods':
          document.getElementById('statWods').textContent = count;
          break;
      }
    }
    
    function createNew() {
      switch(currentTab) {
        case 'gare': window.location.href = 'gara.html'; break;
        case 'season': window.location.href = 'season.html'; break;
        case 'wods': window.location.href = 'wods.html'; break;
      }
    }
    
    async function deleteItem(id) {
      if (!confirm('Eliminare questo elemento?')) return;
      
      let path = '';
      switch(currentTab) {
        case 'gare': path = 'ark_competitions'; break;
        case 'season': path = 'ark_seasons'; break;
        case 'wods': path = 'ark_wods'; break;
      }
      
      try {
        await firebase.database().ref(`${path}/${id}`).remove();
        loadData();
      } catch (error) {
        alert('Errore durante l\'eliminazione');
      }
    }

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkSession()) {
        // Focus first input
        document.getElementById('emailInput').focus();
      }
    });
  </script>
</body>
</html>
