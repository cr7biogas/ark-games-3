<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ARK GAMES</title>
  <link rel="stylesheet" href="../assets/css/design-system.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>

  <section class="hero-section">
    <picture class="hero-bg">
      <source srcset="../assets/images/admin/admin-hero.webp" type="image/webp">
      <img src="../assets/images/admin/admin-hero.jpg" alt="Command Center" loading="eager">
    </picture>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="back-link"><a href="../index.html">← ARENA</a></div>
      <h1 class="page-title">
        <span class="title-icon">⚙️</span>
        <span class="title-text">COMANDO</span>
      </h1>
      <p class="page-subtitle">Architect the battle. Control the arena.</p>
    </div>
  </section>

  <section class="actions-section">
    <div class="container">
      <div class="action-grid">
        
        <div class="action-card">
          <div class="card-header">
            <span class="card-icon">🏆</span>
            <h2 class="card-title">GARA</h2>
          </div>
          <div class="card-body"><p>Crea e gestisci competizioni. Setup completo.</p></div>
          <div class="card-footer"><a href="gara.html" class="btn btn-primary">SETUP →</a></div>
        </div>
        
        <div class="action-card">
          <div class="card-header">
            <span class="card-icon">💪</span>
            <h2 class="card-title">WOD</h2>
          </div>
          <div class="card-body"><p>Costruisci workout. Definisci le battaglie.</p></div>
          <div class="card-footer"><a href="wods.html" class="btn btn-secondary">BUILDER →</a></div>
        </div>
        
        <div class="action-card">
          <div class="card-header">
            <span class="card-icon">👥</span>
            <h2 class="card-title">TEAM</h2>
          </div>
          <div class="card-body"><p>Organizza squadre. Assegna atleti.</p></div>
          <div class="card-footer"><a href="teams.html" class="btn btn-secondary">GESTISCI →</a></div>
        </div>
        
      </div>
    </div>
  </section>

  <footer class="section-footer">
    <p class="footer-text">COMMAND THE BATTLE</p>
  </footer>

</body>
</html>
